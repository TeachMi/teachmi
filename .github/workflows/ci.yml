name: ci

on:
  pull_request:
    branches:
      - main
      - e2e
  push:
    branches:
      - main
      - e2e
      - "feature/**"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: typecheck, lint, test, build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history on PRs so the check:migrations step can compute
          # a merge-base against the base ref. On non-PR events, default
          # depth=1 is fine.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Validate promotion source branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$BASE_REF" = "main" ] && [ "$HEAD_REF" != "e2e" ]; then
            echo "Pull requests into main must promote from e2e."
            exit 1
          fi

          if [ "$BASE_REF" = "e2e" ] && [[ "$HEAD_REF" != feature/* ]]; then
            echo "Pull requests into e2e must come from feature/* branches."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Storybook coverage (every components/ui/*.tsx has *.stories.tsx)
        run: pnpm check:stories

      - name: Migration coverage (schema.ts edits require a new drizzle/*.sql)
        if: github.event_name == 'pull_request'
        run: pnpm check:migrations

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Golden path E2E
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-quality-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  e2e-throttled:
    name: nightly throttled E2E
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout e2e branch
        uses: actions/checkout@v4
        with:
          ref: e2e

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Throttled student loop E2E
        run: pnpm test:e2e:throttled

      - name: Upload throttled Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-throttled-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  socket:
    name: Socket dependency scan
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Require Socket API key
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
        run: test -n "$SOCKET_SECURITY_API_KEY"

      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade

      - name: Run Socket scan
        timeout-minutes: 15
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi

          for attempt in 1 2 3; do
            if socketcli \
              --target-path "$GITHUB_WORKSPACE" \
              --scm github \
              --pr-number "$PR_NUMBER"; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((2 ** attempt))
              echo "Socket scan attempt $attempt failed. Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done

          echo "Socket scan failed after 3 attempts."
          exit 1

  migrate-e2e:
    name: Apply Drizzle migrations to e2e
    if: github.ref == 'refs/heads/e2e' && github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: migrate-e2e
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Drizzle migrations (e2e)
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.E2E_DATABASE_URL_UNPOOLED }}

  migrate-prod:
    name: Apply Drizzle migrations to prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: migrate-prod
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Drizzle migrations (prod)
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.PROD_DATABASE_URL_UNPOOLED }}
